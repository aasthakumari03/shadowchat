<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowChat | Secure Anonymous Messaging</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-left" onclick="location.reload()">
            <div class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="nav-brand">Shadowchat</span>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="alert('Login coming soon!')">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Login</span>
            </button>
            <button class="nav-btn btn-highlight" onclick="showApp()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                <span>Get Started</span>
            </button>
        </div>
    </nav>

    <div class="main-container">
        <div class="brand-section">
            <h1 class="brand-name">Shadowchat</h1>
            <p class="brand-tagline">Connect instantly, chat privately, disappear completely</p>
            <button id="getStartedBtn" onclick="showApp()" class="button-primary" style="width: auto; padding: 12px 40px; margin-top: 1rem; font-size: 1.1rem; border-radius: 30px;">Get Started</button>
        </div>

        <!-- Main Card -->
        <div class="card" id="mainCard" style="display: none;">
            <button onclick="createSession()" class="button-primary">Create New Session</button>
            
            <div style="margin: 1.5rem 0; color: var(--text-muted); font-size: 0.9rem;">OR JOIN EXISTING</div>
            
            <input id="sessionInput" placeholder="Enter Session Code" class="input-field" />
            <button onclick="joinSession()" class="button-primary" style="background: var(--card-bg); border: 1px solid var(--primary);">Join Session</button>

            <h3 id="sessionId" style="margin-top: 1rem; color: var(--primary); font-weight: 600;"></h3>

            <!-- Chat Section -->
            <div id="chat" style="display: none; margin-top: 2rem; text-align: left;">
                <div id="messages" style="height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05);"></div>
                
                <input id="msg" placeholder="Type a message..." class="input-field" />
                
                <div style="display: flex; gap: 1rem;">
                    <button onclick="sendMessage()" class="button-primary" style="flex: 2;">Send</button>
                    <button onclick="endSession()" class="button-primary" style="flex: 1; background: #ea4335;">End</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Popup (Simplified) -->
    <div id="qrBox" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div class="card" style="width: 300px; text-align: center;">
            <p style="margin-bottom: 1rem;">Session QR Code</p>
            <div id="qrDisplay" style="background: white; padding: 10px; border-radius: 12px; width: 200px; height: 200px; margin: 0 auto;"></div>
            <button onclick="toggleQR()" class="button-primary" style="margin-top: 1.5rem; background: #ea4335;">Close</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
