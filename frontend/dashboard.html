<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | shadowchat</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        /* Profile Navigation Overrides */
        .nav-profile-logo {
            width: 42px;
            height: 42px;
            border-radius: 4px; /* Square based logo */
            overflow: hidden;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transition: var(--transition);
            cursor: pointer;
        }
        
        .nav-profile-logo:hover {
            transform: scale(1.05);
            border-color: #fff;
        }
        
        .nav-profile-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- Background Effects (Reusing from index.html) -->
    <div class="bg-vibe-container">
        <div class="vibe-element bubble-1"></div>
        <div class="vibe-element bubble-2"></div>
        <!-- Rising Emojis at slow speed -->
        <div class="vibe-element emoji" style="--d: 40s; --delay: 0s; --x: 10%;">💬</div>
        <div class="vibe-element emoji" style="--d: 48s; --delay: 2s; --x: 25%;">✨</div>
        <div class="vibe-element emoji" style="--d: 38s; --delay: 4s; --x: 40%;">🔥</div>
        <div class="vibe-element emoji" style="--d: 55s; --delay: 1s; --x: 55%;">🔒</div>
        <div class="vibe-element emoji" style="--d: 42s; --delay: 6s; --x: 70%;">⚡</div>
        <div class="vibe-element emoji" style="--d: 40s; --delay: 5s; --x: 5%;">🌈</div>
    </div>

    <!-- Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-left">
            <div class="nav-profile-logo">
                <img src="avatar.png" alt="Profile Avatar">
            </div>
        </div>

        <div class="nav-right">
            <span class="nav-brand-text" style="font-size: 1.4rem; margin-right: 20px;">shadowchat</span>
            <button class="button-ghost" onclick="window.location.href='index.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </button>
        </div>
    </nav>

    <main class="dashboard-container">
        <!-- Dashboard Content can be added here -->
    </main>

    <div class="bottom-credit">ALL RIGHTS RESERVED|2026|AASTHA KUMARI</div>
</body>
</html>
